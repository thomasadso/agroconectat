<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicar Cosecha - AgroConecta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #map { height: 300px; border-radius: 15px; border: 2px solid #ddd; cursor: crosshair; }
    </style>
</head>
<body class="bg-light">
    
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card p-5">
                    
                    <div class="text-center mb-5">
                        <img src="/img/maiz.png" height="60" alt="logo">
                        <h2 class="text-success fw-bold mt-2">Registrar Cosecha</h2>
                        <p class="text-muted">Dinos qué cultivaste y dónde estás ubicado.</p>
                    </div>

                    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="form-label fw-bold">Nombre de la Cosecha</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Sandía Premium" required>
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label fw-bold">Precio (COP)</label>
                                <input type="number" th:field="*{precio}" class="form-control" placeholder="$ 0" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Categoría</label>
                                <select th:field="*{categoria}" class="form-select">
                                    <option value="Frutas">Frutas</option>
                                    <option value="Tubérculos">Tubérculos</option>
                                    <option value="Hortalizas">Hortalizas</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Municipio / Ubicación Aprox.</label>
                                <input type="text" th:field="*{ubicacion}" class="form-control" placeholder="Ej: Soacha, Cundinamarca" required>
                            </div>
                        </div>

                        <div class="mb-4 mt-3">
                            <label class="form-label fw-bold text-success"><i class="fa-solid fa-map-location-dot"></i> Haz clic en el mapa para ubicar tu finca</label>
                            <div id="map"></div>
                            <input type="hidden" th:field="*{latitud}" id="latitud">
                            <input type="hidden" th:field="*{longitud}" id="longitud">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold">Foto Real de la Cosecha</label>
                            <input type="file" name="file" class="form-control" accept="image/*">
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-success btn-lg fw-bold rounded-pill w-100 py-3">
                                <i class="fa-solid fa-cloud-arrow-up"></i> Publicar en Catálogo
                            </button>
                            <a th:href="@{/productos}" class="btn btn-outline-secondary rounded-pill fw-bold">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        // 1. Iniciamos el mapa en Bogotá por defecto
        var defaultLat = 4.6097;
        var defaultLng = -74.0817;
        var map = L.map('map').setView([defaultLat, defaultLng], 12);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        // 2. FUNCIÓN AL HACER CLIC EN EL MAPA
        map.on('click', function(e) {
            var coords = e.latlng;
            
            // Llenamos los inputs ocultos para enviárselos a Java
            document.getElementById('latitud').value = coords.lat;
            document.getElementById('longitud').value = coords.lng;

            // Ponemos o movemos el marcador
            if (marker) {
                marker.setLatLng(coords);
            } else {
                marker = L.marker(coords).addTo(map);
            }
        });
    </script>
</body>
</html>
