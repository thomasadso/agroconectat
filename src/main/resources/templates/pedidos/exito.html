<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Compra Exitosa! - AgroConecta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: white; padding: 4rem 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 600px; border-top: 8px solid #4caf50; }
        .icon-wrapper { width: 100px; height: 100px; background: #e8f5e9; color: #4caf50; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 2rem auto; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-wrapper">
            <i class="fa-solid fa-check"></i>
        </div>
        <h2 class="fw-bold text-dark mb-3">¡Transacción Exitosa!</h2>
        <p class="text-muted fs-5 mb-4">Gracias por apoyar el comercio justo. Tu pago ha sido procesado y el campesino ha sido notificado para preparar tu pedido.</p>
        
        <div class="bg-light p-3 rounded mb-4 border">
            <p class="mb-0 fw-bold text-dark">Código de Transacción: <span class="text-success" th:text="'#AC-1000' + ${pedidoId}"></span></p>
        </div>

        <a th:href="@{/pedidos/factura/{id}(id=${pedidoId})}" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm mb-3" target="_blank">
            <i class="fa-solid fa-file-pdf"></i> Descargar Factura DIAN
        </a>

        <a th:href="@{/catalogo}" class="btn btn-outline-secondary w-100 rounded-pill fw-bold">
            <i class="fa-solid fa-basket-shopping"></i> Seguir Comprando
        </a>
    </div>

</body>
</html>
