<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - AgroConecta Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --admin-dark: #1a1a2e; --agro-green: #2e7d32; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: var(--admin-dark); min-height: 100vh; color: white; }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; }
        .stat-card:hover { transform: scale(1.05); }
        .bg-gradient-green { background: linear-gradient(45deg, #2e7d32, #4caf50); color: white; }
        .bg-gradient-blue { background: linear-gradient(45deg, #1565c0, #1e88e5); color: white; }
        .bg-gradient-orange { background: linear-gradient(45deg, #ef6c00, #ff9800); color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-4">
                <h4 class="fw-bold text-success mb-5"><i class="fa-solid fa-shield-halved"></i> AGRO-ADMIN</h4>
                <nav class="nav flex-column gap-3">
                    <a class="nav-link text-white fw-bold border-bottom pb-2" href="#"><i class="fa-solid fa-chart-line me-2"></i> Dashboard</a>
                    <a class="nav-link text-white-50" href="#"><i class="fa-solid fa-users me-2"></i> Usuarios</a>
                    <a class="nav-link text-white-50" href="#"><i class="fa-solid fa-boxes-stacked me-2"></i> Productos</a>
                    <form th:action="@{/logout}" method="post" class="mt-5">
                        <button class="btn btn-outline-danger w-100 rounded-pill">Cerrar Sesión</button>
                    </form>
                </nav>
            </div>

            <div class="col-md-10 p-5">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2 class="fw-bold">Resumen de Operaciones Globales</h2>
                    <span class="badge bg-dark p-2 px-3 rounded-pill">Bienvenido, Thomas (SuperAdmin)</span>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-3">
                        <div class="card stat-card bg-gradient-green shadow p-3">
                            <small>Ventas Totales</small>
                            <h3 class="fw-bold" th:text="'$ ' + ${#numbers.formatDecimal(ventasTotales, 0, 'COMMA', 0, 'POINT')}"></h3>
                            <i class="fa-solid fa-money-bill-trend-up float-end opacity-50"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-gradient-blue shadow p-3">
                            <small>Usuarios Registrados</small>
                            <h3 class="fw-bold" th:text="${numUsuarios}"></h3>
                            <i class="fa-solid fa-user-group float-end opacity-50"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-gradient-orange shadow p-3">
                            <small>Cosechas Activas</small>
                            <h3 class="fw-bold" th:text="${numProductos}"></h3>
                            <i class="fa-solid fa-wheat-awn float-end opacity-50"></i>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-white shadow p-3 text-dark">
                            <small>Pedidos Realizados</small>
                            <h3 class="fw-bold" th:text="${numPedidos}"></h3>
                            <i class="fa-solid fa-cart-check float-end text-success opacity-50"></i>
                        </div>
                    </div>
                </div>

                <div class="card shadow border-0 rounded-4">
                    <div class="card-header bg-white p-4">
                        <h5 class="fw-bold m-0">Últimos Pedidos en AgroConecta</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Ref.</th>
                                    <th>Comprador</th>
                                    <th>Producto</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${ultimosPedidos}">
                                    <td th:text="'#AC-' + ${p.id}"></td>
                                    <td th:text="${p.usuario.nombre}"></td>
                                    <td th:text="${p.producto.nombre}"></td>
                                    <td class="fw-bold text-success" th:text="'$' + ${p.total}"></td>
                                    <td><span class="badge bg-success" th:text="${p.estado}"></span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
